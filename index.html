<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        header {
            text-align: center;
            padding: 15px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 24px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-container input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
            font-size: 16px;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* آٹو گرافک پوسٹر جو کبھی بلاک نہیں ہوگا */
        .poster-bg {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #000;
        }
        .poster-bg h2 {
            font-size: 45px;
            margin: 0;
        }
        .movie-info {
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
        }
        .player-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 15px;
            border-radius: 10px;
        }
        .video-wrapper {
            margin: 20px 0;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            background-color: #ffcc00;
        }
        .btn-back {
            background-color: #ffffff;
            color: #000;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. ہوم پیج ویو -->
    <div id="home-view">
        <div class="search-container">
            <input type="text" id="search-input" onkeyup="filterMovies()" placeholder="یہاں مووی کا نام سرچ کریں...">
        </div>
        
        <h3 style="color: #ffcc00; text-align: center;">Latest Releases</h3>
        
        <div class="movie-grid">
            <!-- مووی 1 -->
            <div class="movie-card" onclick="playMovie('Kenatha Kanom (2026) DS4K WEB-DL [Hindi & Tamil]', 'https://w3schools.com')">
                <div class="poster-bg">
                    <h2>🎬</h2>
                    <b style="font-size: 11px;">MOVIES HUB 4U</b>
                </div>
                <div class="movie-info">Kenatha Kanom (2026) DS4K WEB-DL [Hindi & Tamil] Dual Audio</div>
            </div>

            <!-- مووی 2 -->
            <div class="movie-card" onclick="playMovie('Undertone (2026) WEB-DL [Hindi & English]', 'https://w3schools.com')">
                <div class="poster-bg" style="background: linear-gradient(135deg, #00ffcc 0%, #006699 100%);">
                    <h2>🍿</h2>
                    <b style="font-size: 11px;">MOVIES HUB 4U</b>
                </div>
                <div class="movie-info">Undertone (2026) WEB-DL [Hindi & English] Dual Audio</div>
            </div>
        </div>
    </div>

    <!-- 2. پلے اور ڈاؤن لوڈ ویو -->
    <div id="download-view" style="display: none;">
        <div class="player-container">
            <button class="btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h2 id="movie-title">Movie Title</h2>
            
            <div class="video-wrapper">
                <video id="main-player" controls preload="auto">
                    <source id="video-src" src="" type="video/mp4">
                    آپ کا براؤزر ویڈیو سپورٹ نہیں کرتا۔
                </video>
            </div>
            
            <div class="btn-container">
                <a id="download-link" href="" download class="btn">📥 Click to Download</a>
            </div>
        </div>
    </div>

    <script>
        // مووی پلے کرنے کا سسٹم
        function playMovie(title, videoUrl) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            document.getElementById('movie-title').innerText = title;
            
            const player = document.getElementById('main-player');
            document.getElementById('video-src').src = videoUrl;
            document.getElementById('download-link').href = videoUrl;
            
            player.load();
            player.play();
        }

        // واپس ہوم پیج پر جانے کا بٹن
        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('main-player').pause();
        }

        // سرچ بار فلٹر
        function filterMovies() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('movie-info').innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
