<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            letter-spacing: 2px;
        }
        .search-box {
            text-align: center;
            margin-bottom: 25px;
        }
        .search-box input {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
            font-size: 16px;
        }
        /* مووی گریڈ */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }
        /* آٹو گرافک پوسٹر جو کبھی بلاک نہیں ہوگا */
        .poster-box {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #1f2833 0%, #2c3531 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-bottom: 2px solid #ffcc00;
            position: relative;
        }
        .poster-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .movie-info {
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            line-height: 1.3;
        }
        /* ڈاؤن لوڈ ویو */
        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .player-section {
            margin: 25px 0;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            max-height: 360px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            text-align: center;
            width: 80%;
            max-width: 260px;
            display: inline-block;
        }
        .btn-download { background-color: #ffcc00; }
        .btn-download:hover { background-color: #cca300; }
        .btn-back { background-color: #ffffff; color: #000; font-size: 14px; width: auto; padding: 8px 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. مین ہوم پیج ویو -->
    <div id="home-view">
        <div class="search-box">
            <input type="text" id="search-input" onkeyup="searchMovies()" placeholder="یہاں مووی کا نام سرچ کریں...">
        </div>
        
        <div class="movie-grid" id="movies-container">
            
            <!-- مووی 1 -->
            <div class="movie-card" onclick="openMovie('Kenatha Kanom (2026) DS4K WEB-DL [Hindi & Tamil]', 'https://w3schools.com')">
                <div class="poster-box">
                    <span class="poster-icon">🎬</span>
                    <span style="color:#ffcc00; font-weight:bold; font-size:12px; text-align:center; padding:0 10px;">MOVIES HUB</span>
                </div>
                <div class="movie-info">Kenatha Kanom (2026) DS4K WEB-DL [Hindi & Tamil] Dual Audio</div>
            </div>

            <!-- مووی 2 -->
            <div class="movie-card" onclick="openMovie('Undertone (2026) WEB-DL [Hindi & English]', 'https://w3schools.com')">
                <div class="poster-box">
                    <span class="poster-icon">🍿</span>
                    <span style="color:#ffcc00; font-weight:bold; font-size:12px; text-align:center; padding:0 10px;">MOVIES HUB</span>
                </div>
                <div class="movie-info">Undertone (2026) WEB-DL [Hindi & English] Dual Audio</div>
            </div>

        </div>
    </div>

    <!-- 2. لائیو پلے اور ڈاؤن لوڈ ویو -->
    <div id="download-view" style="display: none;">
        <div class="container">
            <button class="btn btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h1 id="movie-title" style="font-size:22px; margin-bottom:20px;">Movie Title</h1>

            <!-- لائیو پلیئر جو کلک کرتے ہی چلے گا -->
            <div class="player-section">
                <h3 style="color:#ffcc00; margin-bottom:15px;">Watch Online (Live Play)</h3>
                <video id="video-player" controls preload="auto">
                    <source id="video-source" src="" type="video/mp4">
                    آپ کا براؤزر ویڈیو پلے نہیں کر سکتا۔
                </video>
            </div>

            <!-- ڈائریکٹ ڈاؤن لوڈ بٹن -->
            <div class="btn-container">
                <a id="download-btn" href="" download class="btn btn-download">📥 Click to Download</a>
            </div>
        </div>
    </div>

    <script>
        // مووی کارڈ پر کلک کرنے سے پلے پیج کھولنے کا سسٹم
        function openMovie(title, videoLink) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            window.scrollTo(0, 0);

            // ٹائٹل اور لنکس سیٹ کرنا
            document.getElementById('movie-title').innerText = title;
            
            const player = document.getElementById('video-player');
            const source = document.getElementById('video-source');
            const downloadBtn = document.getElementById('download-btn');

            source.src = videoLink;
            downloadBtn.href = videoLink;
            
            player.load(); // نیا لنک لوڈ کریں
            player.play(); // خود بخود پلے کریں
        }

        // واپس ہوم پیج پر جانے کا فنکشن
        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('video-player').pause(); // ویڈیو بند کریں
        }

        // سرچ بار کا فنکشن
        function searchMovies() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('movie-info')[0].innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
