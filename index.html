<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviesHub - Download Free Full HD Movies & Web Series</title>
    <style>
        /* Modern Cinematic Dark Theme Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a0a0c; color: #e1e1e5; font-size: 14px; padding-bottom: 60px; }
        a { text-decoration: none; color: inherit; }

        /* Full Width Branded Header */
        header { background: #000; padding: 15px 4%; border-bottom: 4px solid #ffb400; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.9); }
        .brand-logo { font-size: 2.2rem; font-weight: 900; letter-spacing: 1.5px; color: #fff; text-transform: uppercase; cursor: pointer; }
        .brand-logo span { color: #ffb400; }
        
        /* Interactive Search Engine Box */
        .search-engine { display: flex; width: 45%; max-width: 500px; }
        .search-engine input { width: 100%; padding: 12px 18px; border: 1px solid #222; background: #141416; color: #fff; border-radius: 4px 0 0 4px; outline: none; font-size: 0.95rem; }
        .search-engine input:focus { border-color: #ffb400; background: #1b1b1f; }
        .search-engine button { padding: 12px 25px; background: #ffb400; border: none; color: #000; font-weight: 900; cursor: pointer; border-radius: 0 4px 4px 0; text-transform: uppercase; font-size: 0.85rem; }

        .wrapper { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* Navigation Category Ribbon Chips */
        .category-filter-ribbon { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; border-bottom: 2px solid #1f1f24; padding-bottom: 18px; }
        .filter-chip { background: #141416; padding: 8px 16px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; color: #aaa; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .filter-chip:hover, .filter-chip.active { background: #ffb400; color: #000; border-color: #ffb400; box-shadow: 0 4px 12px rgba(255,180,0,0.3); }

        /* Master Movies Wall Grid */
        .grid-view-section { display: block; }
        .catalog-headline { font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; text-transform: uppercase; border-left: 5px solid #ff3333; padding-left: 12px; }
        .media-asset-matrix { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .movie-showcase-card { background: #141416; border-radius: 6px; overflow: hidden; border: 1px solid #222; position: relative; cursor: pointer; transition: 0.3s; }
        .movie-showcase-card:hover { transform: scale(1.04); border-color: #ffb400; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        
        .floating-quality-badge { position: absolute; top: 12px; left: 12px; background: #ffb400; color: #000; font-weight: 900; font-size: 0.7rem; padding: 4px 8px; border-radius: 3px; text-transform: uppercase; z-index: 10; }
        .floating-year-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.7rem; padding: 4px 8px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        
        .movie-poster-frame { position: relative; width: 100%; height: 280px; background: #000; overflow: hidden; }
        .movie-poster-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .movie-data-meta { padding: 12px; background: #18181c; border-top: 1px solid #222; }
        .movie-title-text { font-size: 0.9rem; font-weight: bold; color: #fff; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 38px; }
        .movie-spec-row { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #aaa; }
        .spec-lang { color: #ffb400; font-weight: bold; }

        /* 📥 AAP KA APNA NATIVE DOWNLOAD PAGE PANEL 📥 */
        .download-view-section { display: none; background: #141416; padding: 30px; border-radius: 8px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .btn-back-home { display: inline-block; background: #222; color: #fff; padding: 10px 20px; font-weight: bold; border-radius: 4px; margin-bottom: 25px; cursor: pointer; border: 1px solid #333; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        .btn-back-home:hover { background: #ffb400; color: #000; border-color: #ffb400; }
        
        .target-movie-heading { font-size: 1.8rem; color: #ffb400; font-weight: 800; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 15px; }
        .movie-inside-layout { display: flex; gap: 30px; margin-bottom: 35px; flex-wrap: wrap; }
        .inside-poster { width: 240px; height: 340px; border-radius: 6px; border: 2px solid #333; object-fit: cover; }
        .inside-info { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 12px; }
        .info-row { font-size: 1rem; color: #ccc; }
        .info-row strong { color: #fff; font-weight: 600; }

        /* Native Downloader Buttons Console */
        .native-terminal-box { background: #0b0b0d; padding: 25px; border-radius: 6px; border-top: 4px solid #ff3333; }
        .terminal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 18px; text-transform: uppercase; color: #fff; }
        .terminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }
        
        .download-node-button { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; font-weight: 900; border-radius: 4px; text-transform: uppercase; font-size: 0.9rem; cursor: pointer; transition: 0.25s; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .node-gdrive { background: linear-gradient(135deg, #11998e, #38ef7d); color: #000; }
        .node-720p { background: linear-gradient(135deg, #1f4068, #162447); color: #fff; }
        .node-1080p { background: linear-gradient(135deg, #4e54c8, #8f94fb); color: #fff; }
        .download-node-button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); filter: brightness(1.15); }
        .node-subtext { font-size: 0.75rem; font-weight: normal; opacity: 0.85; margin-top: 4px; text-transform: none; }
    </style>
</head>
<body>

        <div class="search-engine" id="searchBarWrapper">

                    </div>
