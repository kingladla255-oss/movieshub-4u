<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            letter-spacing: 2px;
        }
        .search-box {
            text-align: center;
            margin-bottom: 25px;
        }
        .search-box input {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
            font-size: 16px;
        }
        /* ہوم پیج موویز کا ڈیزائن */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }
        .movie-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .movie-info {
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            line-height: 1.3;
        }
        /* ڈاؤن لوڈ پیج کا ڈیزائن */
        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .main-poster {
            display: block;
            max-width: 240px;
            margin: 20px auto;
            border-radius: 8px;
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .screenshot-grid img {
            width: 100%;
            border-radius: 5px;
        }
        .player-section {
            margin: 25px 0;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            text-align: center;
            width: 80%;
            max-width: 260px;
            display: inline-block;
        }
        .btn-download { background-color: #ffcc00; }
        .btn-download:hover { background-color: #cca300; }
        .btn-back { background-color: #ffffff; color: #000; font-size: 14px; width: auto; padding: 8px 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. ہوم پیج (یہاں موویز نظر آئیں گی) -->
    <div id="home-view">
        <div class="search-box">
            <input type="text" placeholder="یہاں مووی کا نام سرچ کریں...">
        </div>
        
        <div class="movie-grid">
            
            <!-- مووی کارڈ 1 -->
            <div class="movie-card" onclick="openMovie('Kenatha Kanom (2026) [Hindi-Tamil]', 'https://unsplash.com', 'https://unsplash.com', 'https://unsplash.com', 'https://w3schools.com')">
                <img src="https://unsplash.com" alt="Poster">
                <div class="movie-info">Kenatha Kanom (2026) DS4K WEB-DL [Hindi & Tamil] Dual Audio</div>
            </div>

            <!-- مووی کارڈ 2 -->
            <div class="movie-card" onclick="openMovie('Undertone (2026) [Hindi-English]', 'https://unsplash.com', 'https://unsplash.com', 'https://unsplash.com', 'https://w3schools.com')">
                <img src="https://unsplash.com" alt="Poster">
                <div class="movie-info">Undertone (2026) WEB-DL [Hindi & English] Dual Audio</div>
            </div>

        </div>
    </div>

    <!-- 2. ڈاؤن لوڈ اور پلے پیج (مووی پر کلک کرنے کے بعد شو ہوگا) -->
    <div id="download-view" style="display: none;">
        <div class="container">
            <button class="btn btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h1 id="movie-title">Movie Title</h1>
            <img id="movie-poster" src="" alt="Poster" class="main-poster">

            <div class="screenshots">
                <h3 style="color: #ffcc00; border-bottom: 1px solid #ffcc00; padding-bottom:5px;">Screenshots</h3>
                <div class="screenshot-grid" id="screenshot-container"></div>
            </div>

            <div class="player-section">
                <h3>Watch Online (Live Play)</h3>
                <video id="video-player" controls preload="none">
                    <source id="video-source" src="" type="video/mp4">
                    آپ کا براؤزر ویڈیو پلے نہیں کر سکتا۔
                </video>
            </div>

            <div class="btn-container">
                <a id="download-btn" href="" download class="btn btn-download">📥 Click to Download</a>
            </div>
        </div>
    </div>

    <script>
        // مووی پر کلک کرنے سے ڈاؤن لوڈ ویو دکھانے کا آسان سسٹم
        function openMovie(title, poster, screen1, screen2, videoLink) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            window.scrollTo(0, 0);

            // ڈیٹا سیٹ کرنا
            document.getElementById('movie-title').innerText = title;
            document.getElementById('movie-poster').src = poster;

            // سکرین شاٹس ڈالنا
            const screenContainer = document.getElementById('screenshot-container');
            screenContainer.innerHTML = `<img src="${screen1}"><img src="${screen2}">`;

            // ویڈیو پلے اور ڈاؤن لوڈ لنک لگانا
            document.getElementById('video-source').src = videoLink;
            document.getElementById('video-player').load();
            document.getElementById('download-btn').href = videoLink;
        }

        // واپس ہوم پیج پر جانے کا فنکشن
        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('video-player').pause();
        }
    </script>
</body>
</html>
