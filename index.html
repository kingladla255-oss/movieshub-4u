<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U - Auto Search & Download</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        header {
            text-align: center;
            padding: 15px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 24px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-container input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
            font-size: 16px;
        }
        .search-container button {
            padding: 12px 20px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .movie-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .movie-info {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }
        .player-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 15px;
            border-radius: 10px;
        }
        .iframe-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin: 20px 0;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .btn-back {
            background-color: #ffffff;
            color: #000;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. ہوم پیج اور سرچ بار -->
    <div id="home-view">
        <div class="search-container">
            <input type="text" id="search-query" placeholder="مووی کا نام لکھیں (مثال: Avatar, Jawan)...">
            <button onclick="searchMovies()">Search</button>
        </div>
        
        <h3 style="color: #ffcc00; text-align: center;" id="grid-title">Popular Movies</h3>
        <div class="movie-grid" id="movies-container"></div>
    </div>

    <!-- 2. لائیو پلیئر اور ڈاؤن لوڈ پیج -->
    <div id="download-view" style="display: none;">
        <div class="player-container">
            <button class="btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h2 id="movie-title" style="color: #ffcc00; font-size: 20px;">Movie Title</h2>
            
            <!-- کلاؤڈ اسٹریمنگ سرور جو فلم، سکرین شاٹس اور ڈاؤن لوڈ خود دکھائے گا -->
            <div class="iframe-wrapper">
                <iframe id="video-iframe" src="" allowfullscreen></iframe>
            </div>

            <p style="font-size: 13px; color: #aaa; text-align: center; margin-top:10px;">
                💡 فلم ڈاؤن لوڈ کرنے کے لیے پلیئر اسکرین کے اندر دائیں طرف بنے <b>Download / Menu</b> بٹن پر کلک کریں۔
            </p>
        </div>
    </div>

    <script>
        // ٹیسٹ اور پبلک ڈیٹا بیس کے لیے فری API کیز
        const apiKey = '8265bd1679663a7ea12ac168da84d2e8';
        const container = document.getElementById('movies-container');

        // ویب سائٹ کھلتے ہی ہٹ موویز لوڈ کرنا
        async function loadTrending() {
            try {
                const res = await fetch(`https://themoviedb.org{apiKey}&language=en-US&page=1`);
                const data = await res.json();
                displayMovies(data.results);
            } catch (e) {
                container.innerHTML = '<p style="text-align:center;">نیٹ ورک لوڈ کرنے میں مسئلہ ہے۔ دوبارہ ریفرش کریں۔</p>';
            }
        }

        // سرچ بٹن دبانے پر فلمیں ڈھونڈنا
        async function searchMovies() {
            const query = document.getElementById('search-query').value;
            if (!query) return;
            
            try {
                const res = await fetch(`https://themoviedb.org{apiKey}&query=${encodeURIComponent(query)}&language=en-US`);
                const data = await res.json();
                document.getElementById('grid-title').innerText = `Search Results for: ${query}`;
                displayMovies(data.results);
            } catch (e) {
                alert("سرچ سرور کام نہیں کر رہا۔");
            }
        }

        // فلموں کو پوسٹرز اور نام کے ساتھ ہوم پیج پر دکھانا
        function displayMovies(movies) {
            container.innerHTML = '';
            if(!movies || movies.length === 0) {
                container.innerHTML = '<p style="text-align:center; width:100%;">کوئی مووی نہیں ملی۔ نام انگریزی میں لکھیں۔</p>';
                return;
            }
            
            movies.forEach(movie => {
                if(!movie.poster_path) return; // بغیر پوسٹر والی فلمیں چھوڑ دیں
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => playMovie(movie.id, movie.title);
                
                // گٹ ہب اس لنک کی تصاویر بلاک نہیں کرتا
                const posterUrl = `https://tmdb.org{movie.poster_path}`;
                card.innerHTML = `
                    <img src="${posterUrl}" alt="${movie.title}">
                    <div class="movie-info">${movie.title}</div>
                `;
                container.appendChild(card);
            });
        }

        // مووی پلے اور ڈاؤن لوڈ کرنے کا خودکار سرور لنک
        function playMovie(id, title) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            document.getElementById('movie-title').innerText = title;
            window.scrollTo(0, 0);

            // یہ سرور فلم کی آئی ڈی کی مدد سے لائیو ویڈیو اور سکرین شاٹس لوڈ کرتا ہے
            document.getElementById('video-iframe').src = `https://vidsrc.me{id}`;
        }

        // واپس ہوم پیج پر جانا
        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('video-iframe').src = ''; // بند کرنے پر پلیئر روک دیں
        }

        // پیج اوپن ہوتے ہی چل پڑے گا
        loadTrending();
    </script>
</body>
</html>
