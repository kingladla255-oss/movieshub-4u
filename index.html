<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U - All in One</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            letter-spacing: 2px;
        }
        .search-box {
            text-align: center;
            margin-bottom: 25px;
        }
        .search-box input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
        }
        /* ہوم پیج کا ڈیزائن */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }
        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            background-color: #2c3531;
        }
        .movie-info {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        /* ڈاؤن لوڈ پیج کا ڈیزائن */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 25px;
            border-radius: 10px;
        }
        .main-poster {
            display: block;
            max-width: 280px;
            margin: 20px auto;
            border-radius: 8px;
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .screenshot-grid img {
            width: 100%;
            border-radius: 5px;
        }
        .player-section {
            margin: 30px 0;
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 700px;
            border-radius: 8px;
            background: #000;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        .btn-download { background-color: #ffcc00; }
        .btn-back { background-color: #ffffff; color: #000; font-size: 14px; padding: 10px 20px; }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. ہوم پیج والا حصہ -->
    <div id="home-view">
        <div class="search-box">
            <input type="text" placeholder="یہاں مووی کا نام سرچ کریں...">
        </div>
        <div class="movie-grid" id="movie-container">
            <!-- اگر نیٹ ورک نہ ہو تو یہ ٹیسٹ موویز دکھیں گی -->
            <div class="movie-card" onclick="openMovie(550)">
                <img src="https://tmdb.org">
                <div class="movie-info">Fight Club (ٹیسٹ مووی)</div>
            </div>
            <div class="movie-card" onclick="openMovie(27205)">
                <img src="https://tmdb.org">
                <div class="movie-info">Inception (ٹیسٹ مووی)</div>
            </div>
        </div>
    </div>

    <!-- 2. ڈاؤن لوڈ پیج والا حصہ (شروع میں چھپا رہے گا) -->
    <div id="download-view" style="display: none;">
        <div class="container">
            <button class="btn btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h1 id="movie-title">Loading...</h1>
            <img id="movie-poster" src="" alt="Poster" class="main-poster">

            <div class="screenshots">
                <h3 style="color: #ffcc00; border-bottom: 1px solid #ffcc00; padding-bottom:5px;">Screenshots</h3>
                <div class="screenshot-grid" id="screenshot-container"></div>
            </div>

            <div class="player-section">
                <h3>Watch Online (Live Play)</h3>
                <video id="video-player" controls preload="none">
                    <source id="video-source" src="" type="video/mp4">
                </video>
            </div>

            <div class="btn-container">
                <a id="download-btn" href="" download class="btn btn-download">📥 Click to Download</a>
            </div>
        </div>
    </div>

    <script>
        const apiKey = '8265bd1679663a7ea12ac168da84d2e8';
        const movieContainer = document.getElementById('movie-container');

        // انٹرنیٹ سے لاکھوں موویز لوڈ کرنے کا نظام
        async function fetchMovies() {
            try {
                const response = await fetch(`https://themoviedb.org{apiKey}&language=en-US&page=1`);
                if(response.ok) {
                    const data = await response.json();
                    movieContainer.innerHTML = ''; // ٹیسٹ موویز صاف کریں
                    
                    data.results.forEach(movie => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.onclick = () => openMovie(movie.id);
                        
                        const posterUrl = `https://tmdb.org{movie.poster_path}`;
                        card.innerHTML = `
                            <img src="${posterUrl}" alt="${movie.title}">
                            <div class="movie-info">${movie.title}</div>
                        `;
                        movieContainer.appendChild(card);
                    });
                }
            } catch (error) {
                console.log("انٹرنیٹ کنکشن کا مسئلہ ہے، ٹیسٹ موویز چل رہی ہیں۔");
            }
        }

        // مووی پر کلک کرنے سے ڈاؤن لوڈ پیج کھولنے کا فنکشن
        async function openMovie(movieId) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            window.scrollTo(0, 0);

            try {
                // نام اور پوسٹر لانا
                const res = await fetch(`https://themoviedb.org{movieId}?api_key=${apiKey}`);
                const movie = await res.json();
                document.getElementById('movie-title').innerText = movie.title;
                document.getElementById('movie-poster').src = `https://tmdb.org{movie.poster_path}`;

                // سکرین شاٹس لانا
                const imgRes = await fetch(`https://themoviedb.org{movieId}/images?api_key=${apiKey}`);
                const imgData = await imgRes.json();
                const screenContainer = document.getElementById('screenshot-container');
                screenContainer.innerHTML = '';
                
                imgData.backdrops.slice(0, 4).forEach(img => {
                    const imgTag = document.createElement('img');
                    imgTag.src = `https://tmdb.org{img.file_path}`;
                    screenContainer.appendChild(imgTag);
                });

                // مووی ویڈیو اور ڈاؤن لوڈ لنک سیٹ کرنا
                // آپ اپنی فلموں کو جہاں اپلوڈ کریں گے، وہ لنک یہاں تبدیل کریں گے
                const videoUrl = `https://yourserver.com{movieId}.mp4`;
                document.getElementById('video-source').src = videoUrl;
                document.getElementById('video-player').load();
                document.getElementById('download-btn').href = videoUrl;

            } catch (e) {
                document.getElementById('movie-title').innerText = "فلم لوڈ کرنے میں مسئلہ ہوا";
            }
        }

        // واپس ہوم پیج پر جانے کا بٹن
        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('video-player').pause(); // ویڈیو روک دیں
        }

        fetchMovies();
    </script>
</body>
</html>
