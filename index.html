<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U - Explore Millions of Movies</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        header {
            text-align: center;
            padding: 15px;
            background-color: #1f2833;
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 24px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-container input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ffcc00;
            background: #1f2833;
            color: white;
            font-size: 16px;
        }
        .search-container button {
            padding: 12px 20px;
            background-color: #ffcc00;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        /* ہوم پیج گریڈ */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .movie-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .movie-info {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }
        /* پلیئر ویو */
        .player-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 15px;
            border-radius: 10px;
        }
        .iframe-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin: 15px 0;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .btn-back {
            background-color: #ffffff;
            color: #000;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>MOVIES HUB 4 U</h1>
    </header>

    <!-- 1. ہوم پیج اور سرچ سسٹم -->
    <div id="home-view">
        <div class="search-container">
            <input type="text" id="search-query" placeholder="سرچ کریں (مثال: Jawan, Pathaan, Avatar)...">
            <button onclick="searchMovies()">Search</button>
        </div>
        
        <h3 style="color: #ffcc00; text-align: center;" id="grid-title">Latest Popular Movies</h3>
        <div class="movie-grid" id="movies-container">
            <!-- یہاں انٹرنیٹ سے تازہ ترین فلمیں خود بخود لوڈ ہوں گی -->
        </div>
    </div>

    <!-- 2. لائیو پلیئر اور ڈاؤن لوڈ پیج -->
    <div id="download-view" style="display: none;">
        <div class="player-container">
            <button class="btn-back" onclick="goBack()">⬅ Back to Home</button>
            <h2 id="movie-title" style="color: #ffcc00; font-size: 20px;">Movie Title</h2>
            
            <!-- یہ لائیو اسٹریمنگ پلیئر ہے جو 100% کام کرے گا اور اس میں ڈاؤن لوڈ بٹن بھی ہوگا -->
            <div class="iframe-wrapper">
                <iframe id="video-iframe" src="" allowfullscreen></iframe>
            </div>
            
            <p style="font-size: 13px; color: #aaa; text-align: center;">پلیئر کے اندر موجود ڈاؤن لوڈ آئیکن پر کلک کر کے آپ فلم ڈاؤن لوڈ کر سکتے ہیں۔</p>
        </div>
    </div>

    <script>
        const apiKey = '8265bd1679663a7ea12ac168da84d2e8';
        const container = document.getElementById('movies-container');

        // ویب سائٹ کھلتے ہی ہٹ موویز لانے کا نظام
        async function loadPopularMovies() {
            try {
                const res = await fetch(`https://themoviedb.org{apiKey}&language=en-US&page=1`);
                const data = await res.json();
                displayMovies(data.results);
            } catch (e) {
                console.log("Error loading popular movies");
            }
        }

        // سرچ بار کا بالکل نیا اور آٹومیٹک سسٹم
        async function searchMovies() {
            const query = document.getElementById('search-query').value;
            if (!query) return;
            
            try {
                const res = await fetch(`https://themoviedb.org{apiKey}&query=${encodeURIComponent(query)}&language=en-US`);
                const data = await res.json();
                document.getElementById('grid-title').innerText = `Search Results for: ${query}`;
                displayMovies(data.results);
            } catch (e) {
                alert("سرچ کرنے میں کوئی مسئلہ ہوا، دوبارہ کوشش کریں۔");
            }
        }

        // فلموں کو اسکرین پر سجانا
        function displayMovies(movies) {
            container.innerHTML = '';
            if(movies.length === 0) {
                container.innerHTML = '<p style="text-align:center; width:100%;">کوئی مووی نہیں ملی۔ نام دوبارہ چیک کریں۔</p>';
                return;
            }
            
            movies.forEach(movie => {
                if(!movie.poster_path) return; // اگر تصویر نہ ہو تو چھوڑ دیں
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => playMovie(movie.id, movie.title);
                
                const posterUrl = `https://tmdb.org{movie.poster_path}`;
                card.innerHTML = `
                    <img src="${posterUrl}" alt="${movie.title}">
                    <div class="movie-info">${movie.title}</div>
                `;
                container.appendChild(card);
            });
        }

        // پلے بٹن کا آخری حل (یہ سرور 100% فلمیں پلے کرتا ہے)
        function playMovie(id, title) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('download-view').style.display = 'block';
            document.getElementById('movie-title').innerText = title;
            window.scrollTo(0, 0);

            // یہ کلاؤڈ سرور مووی آئی ڈی کی مدد سے اصل ویڈیو اور ڈاؤن لوڈ لنک خود بخود لوڈ کر دے گا
            document.getElementById('video-iframe').src = `https://vidsrc.to{id}`;
        }

        function goBack() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('download-view').style.display = 'none';
            document.getElementById('video-iframe').src = ''; // پلیئر بند کریں
        }

        // ویب سائٹ اوپن ہوتے ہی موویز چل پڑیں گی
        loadPopularMovies();
    </script>
</body>
</html>
