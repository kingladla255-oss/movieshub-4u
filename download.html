<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Hub 4 U - Movie Details</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1f2833;
            padding: 25px;
            border-radius: 10px;
        }
        h1 {
            color: #ffcc00;
            text-align: center;
        }
        .main-poster {
            display: block;
            max-width: 280px;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .screenshots {
            margin: 30px 0;
        }
        .screenshots h3 {
            color: #ffcc00;
            border-bottom: 1px solid #ffcc00;
            padding-bottom: 5px;
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .screenshot-grid img {
            width: 100%;
            border-radius: 5px;
        }
        .player-section {
            margin: 30px 0;
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 700px;
            border-radius: 8px;
            background: #000;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            transition: background 0.2s;
        }
        .btn-download {
            background-color: #ffcc00;
        }
        .btn-download:hover {
            background-color: #cca300;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- مووی کا نام خود بخود یہاں آئے گا -->
        <h1 id="movie-title">Loading...</h1>
        
        <!-- مووی کا مین پوسٹر خود بخود یہاں آئے گا -->
        <img id="movie-poster" src="" alt="Poster" class="main-poster" style="display:none;">

        <!-- مووی کے سکرین شاٹس (بیک ڈراپس) خود بخود یہاں آئیں گے -->
        <div class="screenshots">
            <h3>Movie Screenshots</h3>
            <div class="screenshot-grid" id="screenshot-container"></div>
        </div>

        <!-- آن لائن لائیو پلے کرنے کا پلیئر -->
        <div class="player-section">
            <h3>Watch Online (Live Play)</h3>
            <video id="video-player" controls preload="none">
                <!-- یہاں ویڈیو فائل کا لنک آئے گا -->
                <source id="video-source" src="" type="video/mp4">
                آپ کا براؤزر ویڈیو پلے نہیں کر سکتا۔
            </video>
        </div>

        <!-- ڈائریکٹ ڈاؤن لوڈ بٹن -->
        <div class="action-buttons">
            <a id="download-btn" href="" download class="btn btn-download">📥 Click to Download</a>
        </div>
    </div>

    <script>
        const apiKey = '8265bd1679663a7ea12ac168da84d2e8';
        
        // یو آر ایل (URL) سے مووی کی آئی ڈی نکالنا
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        async function getMovieDetails() {
            if (!movieId) return;
            try {
                // 1. مووی کا نام اور پوسٹر لانا
                const movieResponse = await fetch(`https://themoviedb.org{movieId}?api_key=${apiKey}&language=en-US`);
                const movie = await movieResponse.json();
                
                document.getElementById('movie-title').innerText = movie.title;
                const posterElement = document.getElementById('movie-poster');
                posterElement.src = `https://tmdb.org{movie.poster_path}`;
                posterElement.style.display = 'block';

                // 2. مووی کے سکرین شاٹس (Images) لانا
                const imagesResponse = await fetch(`https://themoviedb.org{movieId}/images?api_key=${apiKey}`);
                const imagesData = await imagesResponse.json();
                const screenshotContainer = document.getElementById('screenshot-container');
                
                // پہلے 4 سکرین شاٹس دکھانا
                imagesData.backdrops.slice(0, 4).forEach(img => {
                    const imgTag = document.createElement('img');
                    imgTag.src = `https://tmdb.org{img.file_path}`;
                    screenshotContainer.appendChild(imgTag);
                });

                // 3. مووی ڈاؤن لوڈ اور پلے لنک سیٹ کرنا
                // نوٹ: چونکہ یہ خودکار سسٹم ہے، آپ کو اپنی مووی فائلز کا نام مووی کی ID پر رکھنا ہوگا (مثال: 550.mp4)
                // آپ اپنی ویڈیوز کو جس سرور یا کلاؤڈ پر رکھیں گے، اس کا لنک نیچے '://yourserver.com' کی جگہ لکھیں گے
                const movieVideoUrl = `https://://yourserver.com${movieId}.mp4`; 
                
                document.getElementById('video-source').src = movieVideoUrl;
                document.getElementById('video-player').load(); // پلیئر کو نیا لنک لوڈ کرنے کے لیے
                document.getElementById('download-btn').href = movieVideoUrl;

            } catch (error) {
                console.error("ڈیٹا لانے میں مسئلہ ہوا:", error);
                document.getElementById('movie-title').innerText = "Error Loading Movie";
            }
        }

        getMovieDetails();
    </script>
</body>
</html>
